<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="440" viewBox="0 0 1400 440" role="img" aria-labelledby="title desc">
  <title id="title">Helios animated frosted glass header</title>
  <desc id="desc">A frosted glass neumorphic window with a glowing sun, dancing rays, and typography for Helios, a JIT-at-the-edge JavaScript runtime.</desc>
  <defs>
    <radialGradient id="sky" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#fff9df"/>
      <stop offset="22%" stop-color="#ffe49a"/>
      <stop offset="52%" stop-color="#fb9f45"/>
      <stop offset="78%" stop-color="#39206c"/>
      <stop offset="100%" stop-color="#100925"/>
    </radialGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8bd"/>
      <stop offset="28%" stop-color="#ffd866" stop-opacity=".96"/>
      <stop offset="57%" stop-color="#ff8d36" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#ff6c1f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset="34%" stop-color="#fff7da" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#ffd278" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".36"/>
    </linearGradient>

    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".94"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#ffbf5f" stop-opacity=".58"/>
    </linearGradient>

    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffefa"/>
      <stop offset="42%" stop-color="#fff0ad"/>
      <stop offset="100%" stop-color="#ffbd54"/>
    </linearGradient>

    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="glassBlur" x="-8%" y="-14%" width="116%" height="128%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.08  0 1 0 0 0.04  0 0 1 0 0  0 0 0 .62 0"/>
    </filter>

    <filter id="shadow" x="-20%" y="-28%" width="140%" height="156%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#12081f" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="-10" stdDeviation="24" flood-color="#ffffff" flood-opacity=".18"/>
    </filter>

    <filter id="textShadow" x="-25%" y="-35%" width="150%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a0800" flood-opacity=".78"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ff9200" flood-opacity=".44"/>
    </filter>

    <filter id="tagShadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a0800" flood-opacity=".64"/>
    </filter>

    <linearGradient id="badgeFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc840" stop-opacity=".54"/>
      <stop offset="100%" stop-color="#c95800" stop-opacity=".42"/>
    </linearGradient>

    <radialGradient id="achieveBadge" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe566" stop-opacity=".97"/>
      <stop offset="55%" stop-color="#ff9100" stop-opacity=".93"/>
      <stop offset="100%" stop-color="#c94800" stop-opacity=".88"/>
    </radialGradient>

    <filter id="achieveGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#ffaa00" flood-opacity=".82"/>
    </filter>

    <linearGradient id="starTrail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fffde0" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="windowClip">
      <rect x="160" y="72" width="1080" height="296" rx="56"/>
    </clipPath>

    <pattern id="grain" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="18" r="1.2" fill="#fff" opacity=".18"/>
      <circle cx="58" cy="7" r=".9" fill="#fff" opacity=".12"/>
      <circle cx="74" cy="56" r="1.1" fill="#fff" opacity=".13"/>
      <circle cx="24" cy="70" r=".8" fill="#ffd88b" opacity=".16"/>
      <circle cx="45" cy="42" r=".7" fill="#fff" opacity=".1"/>
    </pattern>

    <style>
      @media (prefers-reduced-motion: reduce) {
        .ray, .spark, .orb, .shine, .sstar, .ufo-anim { animation: none !important; }
      }

      .ray {
        animation: rotateRays 19s linear infinite;
        transform-origin: 700px 226px;
      }

      .ray-slow {
        animation-duration: 31s;
        animation-direction: reverse;
      }

      .spark {
        animation: drift 7s ease-in-out infinite;
      }

      .spark:nth-of-type(2n) {
        animation-duration: 9s;
        animation-delay: -2s;
      }

      .spark:nth-of-type(3n) {
        animation-duration: 11s;
        animation-delay: -5s;
      }

      .orb {
        animation: breathe 5.5s ease-in-out infinite;
        transform-origin: 700px 226px;
      }

      .shine {
        animation: sweep 8s ease-in-out infinite;
        transform-origin: 700px 220px;
      }

      @keyframes rotateRays {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0); opacity: .42; }
        50% { transform: translate3d(18px, -16px, 0); opacity: .92; }
      }

      @keyframes breathe {
        0%, 100% { transform: scale(.985); opacity: .9; }
        50% { transform: scale(1.045); opacity: 1; }
      }

      @keyframes sweep {
        0%, 100% { transform: translateX(-150px) rotate(-9deg); opacity: .08; }
        46%, 58% { transform: translateX(150px) rotate(-9deg); opacity: .42; }
      }

      .sstar, .ufo-anim {
        opacity: 0;
      }

      @keyframes shootStar {
        0%   { transform: translateX(0);      opacity: 0; }
        4%   { opacity: .88; }
        16%  { transform: translateX(-420px); opacity: 0; }
        100% { transform: translateX(-420px); opacity: 0; }
      }

      @keyframes ufoFly {
        0%, 4.9%  { transform: translateX(1380px); opacity: 0; }
        5%        { transform: translateX(1280px); opacity: 1; }
        5.8%      { transform: translateX(1180px); opacity: .80; }
        13%       { transform: translateX(150px);  opacity: .80; }
        14.5%     { transform: translateX(144px);  opacity: 0; }
        100%      { transform: translateX(144px);  opacity: 0; }
      }

      @keyframes portalOpen {
        0%, 11%   { transform: scale(0);   opacity: 0; }
        13%       { transform: scale(1);   opacity: .76; }
        14.2%     { transform: scale(1.6); opacity: .38; }
        15.5%     { transform: scale(2.5); opacity: 0; }
        100%      { transform: scale(2.5); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1400" height="440" fill="url(#sky)"/>
  <path d="M0 332C151 267 244 291 365 330c150 49 244-23 376-54 174-41 274 65 420 60 102-3 169-44 239-92v196H0Z" fill="#150d2d" opacity=".42"/>
  <path d="M0 359c177-68 314-29 459-6 174 28 294-69 452-61 181 9 252 91 489 17v131H0Z" fill="#09051a" opacity=".52"/>

  <!-- Shooting stars — rendered behind sun, rays, and window -->
  <g id="shootingStars">
    <g transform="translate(1080,28) rotate(-35)">
      <rect class="sstar" x="0" y="-1.2" width="160" height="2.4" rx="1.2"
            fill="url(#starTrail)"
            style="animation:shootStar 24s ease-in -1s infinite;"/>
    </g>
    <g transform="translate(780,15) rotate(-32)">
      <rect class="sstar" x="0" y="-1" width="130" height="2" rx="1"
            fill="url(#starTrail)"
            style="animation:shootStar 31s ease-in -9s infinite;"/>
    </g>
    <g transform="translate(1260,55) rotate(-38)">
      <rect class="sstar" x="0" y="-1.3" width="180" height="2.6" rx="1.3"
            fill="url(#starTrail)"
            style="animation:shootStar 19s ease-in -5s infinite;"/>
    </g>
    <g transform="translate(580,8) rotate(-30)">
      <rect class="sstar" x="0" y="-1" width="120" height="2" rx="1"
            fill="url(#starTrail)"
            style="animation:shootStar 27s ease-in -18s infinite;"/>
    </g>
    <g transform="translate(950,70) rotate(-36)">
      <rect class="sstar" x="0" y="-1.1" width="145" height="2.2" rx="1.1"
            fill="url(#starTrail)"
            style="animation:shootStar 22s ease-in -13s infinite;"/>
    </g>
  </g>

  <!-- Flying saucer — rare warp event in sky (~1× per 65 s), behind all foreground -->
  <g id="ufoScene" transform="translate(0,48)">
    <!-- Saucer + contrails (translate across sky right→left) -->
    <g class="ufo-anim" style="animation:ufoFly 65s ease-in 0s infinite;">
      <!-- Contrails trailing to the right as saucer moves left -->
      <rect x="18" y="-1"   width="210" height="2"   rx="1"   fill="url(#starTrail)" opacity=".52"/>
      <rect x="18" y="3.5"  width="150" height="1.2" rx=".6"  fill="url(#starTrail)" opacity=".28"/>
      <rect x="18" y="-4.5" width="115" height="1.2" rx=".6"  fill="url(#starTrail)" opacity=".22"/>
      <!-- Saucer body -->
      <ellipse cx="0" cy="0"  rx="22" ry="7"  fill="#fffde0" opacity=".84"/>
      <!-- Dome -->
      <ellipse cx="0" cy="-6" rx="10" ry="5"  fill="#fffde0" opacity=".68"/>
      <!-- Window -->
      <circle  cx="0" cy="-6" r="2.5"          fill="#fffde0" opacity=".42"/>
      <!-- Belly glow stripe -->
      <rect x="-18" y="5" width="36" height="1.5" rx=".75"   fill="#fffde0" opacity=".36"/>
    </g>
    <!-- Portal ring — expands at saucer exit point (x=150) -->
    <g transform="translate(150,0)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#fffde0" stroke-width="1.6"
              class="ufo-anim"
              style="animation:portalOpen 65s ease-out 0s infinite;
                     transform-box:fill-box; transform-origin:center;"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#fffde0" stroke-width=".8" opacity=".55"
              class="ufo-anim"
              style="animation:portalOpen 65s ease-out 0s infinite;
                     transform-box:fill-box; transform-origin:center;"/>
    </g>
  </g>

  <g class="orb">
    <circle cx="700" cy="226" r="250" fill="url(#sunGlow)" filter="url(#softBlur)"/>
    <circle cx="700" cy="226" r="122" fill="#fff2a3" opacity=".94"/>
    <circle cx="700" cy="226" r="84" fill="#fff9d7" opacity=".86"/>
  </g>

  <g class="ray" opacity=".5">
    <path d="M700 22 724 202 700 226 676 202Z" fill="#fff3a8"/>
    <path d="M700 418 724 250 700 226 676 250Z" fill="#ffe08c"/>
    <path d="M496 226 676 202 700 226 676 250Z" fill="#fff4bd"/>
    <path d="M904 226 724 202 700 226 724 250Z" fill="#ffd06c"/>
    <path d="M556 82 683 205 700 226 671 217Z" fill="#fff0a2"/>
    <path d="M844 370 717 247 700 226 729 235Z" fill="#ffc35d"/>
    <path d="M844 82 717 205 700 226 729 217Z" fill="#fff0a2"/>
    <path d="M556 370 683 247 700 226 671 235Z" fill="#ffc35d"/>
  </g>

  <g class="ray ray-slow" opacity=".34">
    <path d="M700 -16 740 198 700 226 660 198Z" fill="#fff8c6"/>
    <path d="M700 468 740 254 700 226 660 254Z" fill="#ffbb56"/>
    <path d="M458 226 672 186 700 226 672 266Z" fill="#fff8c6"/>
    <path d="M942 226 728 186 700 226 728 266Z" fill="#ffbb56"/>
  </g>

  <g clip-path="url(#windowClip)" opacity=".88">
    <rect x="130" y="44" width="1140" height="352" fill="#fff" opacity=".08" filter="url(#glassBlur)"/>
    <circle cx="700" cy="226" r="220" fill="#fff6bd" opacity=".18" filter="url(#softBlur)"/>
    <path class="shine" d="M195 0h188l-238 440H-43Z" fill="#fff" opacity=".22"/>
    <path class="shine" d="M1064 0h82L888 440h-85Z" fill="#fff" opacity=".16" style="animation-delay:-3s"/>
    <rect width="1400" height="440" fill="url(#grain)" opacity=".45"/>
  </g>

  <rect x="160" y="72" width="1080" height="296" rx="56" fill="url(#glass)" stroke="url(#edge)" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="180" y="92" width="1040" height="256" rx="42" fill="none" stroke="#fff" stroke-opacity=".35"/>
  <path d="M209 316c151-72 277-23 391-11 168 18 263-76 410-62 98 9 154 44 211 56v49H209Z" fill="#fff" opacity=".07"/>

  <g opacity=".78">
    <circle class="spark" cx="244" cy="128" r="3" fill="#fff8d3"/>
    <circle class="spark" cx="325" cy="304" r="2.5" fill="#ffe7a1"/>
    <circle class="spark" cx="458" cy="116" r="2.2" fill="#fff"/>
    <circle class="spark" cx="977" cy="124" r="2.8" fill="#fff8d3"/>
    <circle class="spark" cx="1125" cy="282" r="3.2" fill="#ffe7a1"/>
    <circle class="spark" cx="1052" cy="320" r="2" fill="#fff"/>
  </g>

  <g text-anchor="middle">
    <text x="700" y="211"
          fill="url(#textGold)"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="82" font-weight="900" letter-spacing="-3"
          filter="url(#textShadow)">Helios</text>
    <text x="700" y="239"
          fill="#ffe8b4"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="17" font-weight="500" letter-spacing="3.8"
          filter="url(#tagShadow)" opacity=".86">JIT AT THE EDGE · BLAZING LIKE THE SUN</text>
  </g>

  <!-- Sun-colored badge pills -->
  <rect x="289" y="260" width="184" height="32" rx="16" fill="url(#badgeFill)" stroke="#ffbf40" stroke-width="1.4" stroke-opacity=".92"/>
  <text x="381" y="280" text-anchor="middle"
        fill="#fff"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="700" letter-spacing=".5"
        filter="url(#tagShadow)">JIT-at-the-edge</text>

  <rect x="487" y="260" width="202" height="32" rx="16" fill="url(#badgeFill)" stroke="#ffbf40" stroke-width="1.4" stroke-opacity=".92"/>
  <text x="588" y="280" text-anchor="middle"
        fill="#fff"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="700" letter-spacing=".5"
        filter="url(#tagShadow)">JavaScript Runtime</text>

  <rect x="703" y="260" width="229" height="32" rx="16" fill="url(#badgeFill)" stroke="#ffbf40" stroke-width="1.4" stroke-opacity=".92"/>
  <text x="817" y="280" text-anchor="middle"
        fill="#fff"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="700" letter-spacing=".5"
        filter="url(#tagShadow)">HTTP/3 · WebTransport</text>

  <rect x="946" y="260" width="166" height="32" rx="16" fill="url(#badgeFill)" stroke="#ffbf40" stroke-width="1.4" stroke-opacity=".92"/>
  <text x="1029" y="280" text-anchor="middle"
        fill="#fff"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="700" letter-spacing=".5"
        filter="url(#tagShadow)">WASM Snapshots</text>

  <!-- Achievement starburst badges -->
  <polygon points="262,101 276,120 300,117 297,141 316,155 297,170 300,193 276,190 262,209 248,190 224,193 227,170 208,155 227,141 224,117 248,120"
           fill="url(#achieveBadge)" stroke="#ffd040" stroke-width="2" filter="url(#achieveGlow)"/>
  <circle cx="262" cy="155" r="38" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity=".35"/>
  <text x="262" y="148" text-anchor="middle"
        fill="#fff8e0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="900" letter-spacing="-.5"
        filter="url(#tagShadow)">160k+</text>
  <text x="262" y="164" text-anchor="middle"
        fill="#fff8e0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="800" letter-spacing=".5"
        filter="url(#tagShadow)">Req/s!</text>
  <text x="262" y="178" text-anchor="middle"
        fill="#ffe4a0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="8.5" font-weight="500" letter-spacing=".3"
        filter="url(#tagShadow)">with 256 connections</text>

  <polygon points="1138,101 1152,120 1176,117 1173,141 1192,155 1173,170 1176,193 1152,190 1138,209 1124,190 1100,193 1103,170 1084,155 1103,141 1100,117 1124,120"
           fill="url(#achieveBadge)" stroke="#ffd040" stroke-width="2" filter="url(#achieveGlow)"/>
  <circle cx="1138" cy="155" r="38" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity=".35"/>
  <text x="1138" y="150" text-anchor="middle"
        fill="#fff8e0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="19" font-weight="900" letter-spacing="-.5"
        filter="url(#tagShadow)">~0.4ms</text>
  <text x="1138" y="167" text-anchor="middle"
        fill="#fff8e0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13.5" font-weight="800" letter-spacing=".5"
        filter="url(#tagShadow)">Latency!</text>

  <!-- "by VRIL LABS" attribution — above window layer -->
  <text x="1186" y="351" text-anchor="end"
        fill="#ffd88b"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="2.8"
        opacity=".62" filter="url(#tagShadow)">by VRIL LABS</text>

</svg>
